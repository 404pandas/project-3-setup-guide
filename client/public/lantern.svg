<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#120c06"/>

  <!-- Chain link top -->
  <line x1="32" y1="2" x2="32" y2="10" stroke="#b03a08" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="32" cy="10" rx="4" ry="2.5" fill="none" stroke="#b03a08" stroke-width="1.5"/>

  <!-- Top cap -->
  <rect x="18" y="12" width="28" height="5" rx="2.5" fill="#3a1a06" stroke="#b03a08" stroke-width="1.5"/>
  <!-- Top cap ridge -->
  <rect x="21" y="11" width="22" height="3" rx="1.5" fill="#5a2c0a"/>

  <!-- Lantern body frame -->
  <rect x="16" y="17" width="32" height="30" rx="3" fill="#0a0806" stroke="#b03a08" stroke-width="1.5"/>

  <!-- Vertical frame bars -->
  <line x1="32" y1="17" x2="32" y2="47" stroke="#3a1a06" stroke-width="2"/>

  <!-- Glass panels with glow -->
  <rect x="18" y="19" width="12" height="26" rx="2" fill="#b03a08" opacity="0.35"/>
  <rect x="34" y="19" width="12" height="26" rx="2" fill="#b03a08" opacity="0.35"/>

  <!-- Inner warm glow -->
  <ellipse cx="32" cy="32" rx="10" ry="12" fill="#d44a10" opacity="0.10"/>

  <!-- Flame body -->
  <ellipse cx="32" cy="28" rx="4" ry="6" fill="#d44a10" opacity="0.9"/>
  <!-- Flame inner -->
  <ellipse cx="32" cy="29" rx="2.2" ry="3.8" fill="#e09a20" opacity="0.95"/>
  <!-- Flame tip -->
  <ellipse cx="32" cy="24" rx="1.2" ry="2.5" fill="#f4e8cc" opacity="0.8"/>

  <!-- Horizontal frame bar (middle) -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#3a1a06" stroke-width="1.2"/>

  <!-- Bottom cap -->
  <rect x="18" y="47" width="28" height="5" rx="2.5" fill="#3a1a06" stroke="#b03a08" stroke-width="1.5"/>
  <!-- Bottom cap ridge -->
  <rect x="21" y="50" width="22" height="3" rx="1.5" fill="#5a2c0a"/>

  <!-- Corner rivets -->
  <circle cx="18" cy="17" r="1.5" fill="#5a2c0a"/>
  <circle cx="46" cy="17" r="1.5" fill="#5a2c0a"/>
  <circle cx="18" cy="47" r="1.5" fill="#5a2c0a"/>
  <circle cx="46" cy="47" r="1.5" fill="#5a2c0a"/>
</svg>
